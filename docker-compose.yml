services:
  postgres:
    image: postgres:16-alpine
    container_name: quanyu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quanyu}
      POSTGRES_USER: ${POSTGRES_USER:-quanyu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quanyu_dev}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quanyu-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./redis-data:/data

  metabase:
    image: metabase/metabase:v0.55.6
    container_name: quanyu-metabase
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${METABASE_PORT:-3001}:3000"
    volumes:
      - ./metabase-data:/metabase-data
